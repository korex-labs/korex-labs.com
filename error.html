<!DOCTYPE html>
<html lang="en">

  <link rel="icon" href="logo.png" type="image/png">

    body {
      font-family: sans-serif;
      display: flex;

      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #111;
      color: #e8e8e8;

    .card {
      background: #1a1a1a;

    }

      height: 80px;
      object-fit: contain;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    h1 { margin: 0.5rem 0; }
    p { color: #999; }
    a { color: #c8a96e; text-decoration: none; }
    a:hover { text-decoration: underline; }

</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Korex Labs logo">
